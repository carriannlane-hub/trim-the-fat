<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trim the Fat! — Redundancy Game</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1028;
    --card: #2a1f3d;
    --accent: #ff6b35;
    --accent-glow: rgba(255, 107, 53, 0.4);
    --correct: #22c55e;
    --correct-glow: rgba(34, 197, 94, 0.4);
    --wrong: #ef4444;
    --text: #f0e6ff;
    --text-dim: #9b8ab8;
    --gold: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Splash Screen ── */
  .splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .splash-icon {
    font-size: 5rem;
    margin-bottom: 1rem;
    animation: bounce 1.5s ease infinite;
  }

  .splash h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 4.5rem;
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent-glow);
    margin-bottom: 0.5rem;
    letter-spacing: -1px;
  }

  .splash p {
    font-size: 1.5rem;
    color: var(--text-dim);
    max-width: 600px;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .start-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    padding: 1rem 3rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 6px 30px var(--accent-glow);
  }

  .start-btn:hover, .start-btn:focus {
    transform: scale(1.05);
    box-shadow: 0 8px 40px var(--accent-glow);
    outline: 3px solid #fff;
    outline-offset: 4px;
  }

  /* ── Game Screen ── */
  .game {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 2rem 3rem;
    animation: fadeIn 0.4s ease;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--accent);
  }

  .round-badge {
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 30px;
    padding: 0.3rem 1rem;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }

  .score-display {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--gold);
  }

  .score-display .star { font-size: 1.5rem; }

  /* Progress bar */
  .progress-track {
    width: 100%;
    height: 8px;
    background: var(--card);
    border-radius: 4px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* Sentence area */
  .sentence-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }

  .instruction {
    font-size: 1.3rem;
    color: var(--text-dim);
    text-align: center;
  }

  .sentence-card {
    background: var(--card);
    border-radius: 24px;
    padding: 3rem 4rem;
    max-width: 1000px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 60px rgba(0,0,0,0.3);
    border: 2px solid transparent;
    transition: border-color 0.3s ease;
  }

  .sentence-card.correct-state {
    border-color: var(--correct);
    box-shadow: 0 10px 60px var(--correct-glow);
  }

  .sentence-card.wrong-state {
    animation: shake 0.4s ease;
  }

  .sentence-words {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    line-height: 2;
  }

  .word-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 2.2rem;
    font-weight: 500;
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
    border: 3px solid transparent;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
  }

  .word-btn:hover, .word-btn:focus {
    background: rgba(255, 107, 53, 0.15);
    border-color: var(--accent);
    outline: none;
  }

  .word-btn.is-answer {
    /* hidden until revealed */
  }

  .word-btn.revealed-correct {
    background: var(--correct);
    color: #fff;
    border-color: var(--correct);
    transform: scale(1.1);
    text-decoration: line-through;
    text-decoration-thickness: 3px;
  }

  .word-btn.wrong-pick {
    background: var(--wrong);
    color: #fff;
    border-color: var(--wrong);
    animation: shake 0.3s ease;
  }

  .word-btn.locked {
    cursor: default;
    pointer-events: none;
  }

  /* Feedback */
  .feedback {
    min-height: 3rem;
    font-size: 1.4rem;
    font-weight: 700;
    text-align: center;
    transition: opacity 0.3s ease;
  }

  .feedback.correct-fb { color: var(--correct); }
  .feedback.wrong-fb { color: var(--wrong); }

  .explanation {
    font-size: 1.1rem;
    color: var(--text-dim);
    font-weight: 400;
    margin-top: 0.3rem;
  }

  .next-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    padding: 0.8rem 2.5rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px var(--accent-glow);
    opacity: 0;
    animation: popIn 0.4s ease 0.3s forwards;
  }

  .next-btn:hover, .next-btn:focus {
    transform: scale(1.05);
    outline: 3px solid #fff;
    outline-offset: 4px;
  }

  /* ── Results Screen ── */
  .results {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .results .trophy { font-size: 6rem; margin-bottom: 1rem; }

  .results h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5rem;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .results .final-score {
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .results .subtitle {
    font-size: 1.3rem;
    color: var(--text-dim);
    max-width: 500px;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .results .stars {
    font-size: 3rem;
    margin-bottom: 2rem;
    letter-spacing: 0.5rem;
  }

  .play-again-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    padding: 0.8rem 2.5rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .play-again-btn:hover, .play-again-btn:focus {
    transform: scale(1.05);
    outline: 3px solid #fff;
    outline-offset: 4px;
  }

  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 2s ease forwards;
    pointer-events: none;
    z-index: 999;
  }

  /* ── Keyframes ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Screen reader only */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
const SENTENCES = [
  {
    words: ["We", "must", "first", "begin", "by", "reviewing", "the", "current", "policy."],
    answer: "first",
    explanation: "\"Begin\" already means to start first — \"first\" is redundant."
  },
  {
    words: ["The", "agency", "will", "completely", "eliminate", "all", "outdated", "forms", "by", "June."],
    answer: "completely",
    explanation: "\"Eliminate\" means to remove entirely — \"completely\" adds nothing."
  },
  {
    words: ["Please", "reply", "back", "with", "your", "availability", "for", "the", "meeting."],
    answer: "back",
    explanation: "A reply is already a response back — \"back\" is redundant."
  },
  {
    words: ["The", "report", "provides", "a", "brief", "summary", "of", "the", "findings."],
    answer: "brief",
    explanation: "A summary is already a shortened version — \"brief\" repeats the idea."
  },
  {
    words: ["Staff", "should", "plan", "ahead", "for", "the", "upcoming", "budget", "cycle."],
    answer: "ahead",
    explanation: "Planning is inherently forward-looking — \"ahead\" is redundant."
  },
  {
    words: ["The", "committee", "will", "merge", "together", "the", "two", "regional", "offices."],
    answer: "together",
    explanation: "Merging already means combining — \"together\" is redundant."
  },
  {
    words: ["Each", "individual", "employee", "must", "complete", "the", "training", "by", "Friday."],
    answer: "individual",
    explanation: "\"Each\" already singles out one at a time — \"individual\" repeats the idea."
  },
  {
    words: ["The", "end", "result", "was", "a", "more", "efficient", "permitting", "process."],
    answer: "end",
    explanation: "A result is already the outcome — \"end\" is unnecessary."
  }
];

let state = 'splash'; // splash | game | results
let currentIndex = 0;
let score = 0;
let answered = false;
let wrongPick = null;

const app = document.getElementById('app');

function render() {
  if (state === 'splash') renderSplash();
  else if (state === 'game') renderGame();
  else renderResults();
}

function renderSplash() {
  app.innerHTML = `
    <div class="splash">
      <div class="splash-icon" aria-hidden="true">✂️</div>
      <h1>Trim the Fat!</h1>
      <p>Each sentence has one redundant word hiding in plain sight. Click the word that doesn't need to be there.</p>
      <button class="start-btn" onclick="startGame()" aria-label="Start the game">Let's Go!</button>
    </div>
  `;
}

function renderGame() {
  const s = SENTENCES[currentIndex];
  const progress = ((currentIndex) / SENTENCES.length) * 100;

  let feedbackHTML = '';
  if (answered) {
    feedbackHTML = `
      <div class="feedback correct-fb" role="status">✓ That's it!</div>
    `;
  } else if (wrongPick) {
    feedbackHTML = `
      <div class="feedback wrong-fb" role="status">✗ Not that one — try again!</div>
    `;
  }

  const wordsHTML = s.words.map(w => {
    const clean = w.replace(/[.,!?;:]/g, '');
    const isAnswer = clean.toLowerCase() === s.answer.toLowerCase();
    const punct = w.replace(clean, '');
    let cls = 'word-btn';

    if (answered && isAnswer) cls += ' revealed-correct locked';
    else if (answered) cls += ' locked';
    else if (wrongPick === clean.toLowerCase()) cls += ' wrong-pick';

    const ariaLabel = answered && isAnswer ? `${clean}, redundant word, removed` : clean;

    return `<button class="${cls}" onclick="pickWord('${clean.toLowerCase()}')" aria-label="${ariaLabel}">${clean}${punct}</button>`;
  }).join(' ');

  app.innerHTML = `
    <div class="game">
      <div class="topbar">
        <div class="topbar-left">
          <div class="game-title">✂️ Trim the Fat!</div>
          <div class="round-badge" aria-label="Sentence ${currentIndex + 1} of ${SENTENCES.length}">${currentIndex + 1} / ${SENTENCES.length}</div>
        </div>
        <div class="score-display" aria-label="Score: ${score} points">
          <span class="star" aria-hidden="true">★</span> ${score}
        </div>
      </div>

      <div class="progress-track" role="progressbar" aria-valuenow="${currentIndex + 1}" aria-valuemin="1" aria-valuemax="${SENTENCES.length}">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>

      <div class="sentence-area">
        <div class="instruction">${answered ? 'Nice work!' : 'Click the redundant word:'}</div>
        <div class="sentence-card ${answered ? 'correct-state' : ''} ${wrongPick && !answered ? 'wrong-state' : ''}">
          <div class="sentence-words">
            ${wordsHTML}
          </div>
        </div>
        ${feedbackHTML}
      </div>
    </div>
  `;
}

function renderResults() {
  app.innerHTML = `
    <div class="results">
      <div class="trophy" aria-hidden="true">🎉</div>
      <h1>Every. Word. Earned its place.</h1>
      <div class="subtitle">If it doesn't add meaning, cut it.</div>
    </div>
  `;

  spawnConfetti();
  setInterval(spawnConfetti, 2500);
}

// ── Game Logic ──

function startGame() {
  state = 'game';
  currentIndex = 0;
  score = 0;
  answered = false;
  wrongPick = null;
  render();
}

function pickWord(word) {
  if (answered) return;
  const s = SENTENCES[currentIndex];

  if (word === s.answer.toLowerCase()) {
    answered = true;
    score++;
    render();
    setTimeout(() => {
      nextSentence();
    }, 1200);
  } else {
    wrongPick = word;
    render();
    setTimeout(() => {
      wrongPick = null;
      render();
    }, 600);
  }
}

function nextSentence() {
  currentIndex++;
  answered = false;
  wrongPick = null;
  if (currentIndex >= SENTENCES.length) {
    state = 'results';
  }
  render();
}

function resetGame() {
  state = 'splash';
  render();
}

function spawnConfetti() {
  const colors = ['#ff6b35', '#fbbf24', '#22c55e', '#a78bfa', '#f472b6', '#38bdf8'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 1.5 + 's';
    el.style.width = (Math.random() * 8 + 6) + 'px';
    el.style.height = (Math.random() * 8 + 6) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

// Start
render();
</script>
</body>
</html>
